name: Lighthouse CI

on:
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        # Version is taken from package.json's "packageManager" field.
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Seed build-time .env from .env.example
        run: cp .env.example .env

      - name: Build project
        run: pnpm build
        env:
          PUBLIC_SITE_URL: https://ecohubs.community

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:4173/
            http://localhost:4173/vision
            http://localhost:4173/blueprint
            http://localhost:4173/membership
            http://localhost:4173/faq
            http://localhost:4173/join
            http://localhost:4173/contact
            http://localhost:4173/blog
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 3
