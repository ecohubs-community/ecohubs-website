<!doctype html>
<html lang="%paraglide.lang%" class="no-js">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="fediverse:creator" content="@ecohubs@mastodon.social" />
		<script>
			document.documentElement.classList.replace('no-js', 'js');
		</script>

		<!-- Fonts are self-hosted via @fontsource imports in src/lib/styles/theme.css;
		     no Google CDN round-trip needed. -->

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
